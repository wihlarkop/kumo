[package]
name = "kumo"
version = "0.1.0"
edition = "2024"

[dependencies]
async-trait = "0.1.89"
bloomfilter = "3.0.1"
governor = "0.10.4"
reqwest = { version = "0.13.2", features = ["json", "cookies"] }
scraper = "0.26.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
thiserror = "2.0.18"
tokio = { version = "1.52.0", features = ["full"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
url = "2.5.8"
