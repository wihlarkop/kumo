name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --all-targets

      - name: Run unit tests
        run: cargo test --lib

      - name: Run integration tests
        run: cargo test --test integration

  feature-matrix:
    name: Feature flags (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "derive"
          - "sqlite"
          - "jsonpath"
          - "persistence"
          - "sqlite jsonpath persistence"
          - "llm"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-feat-${{ matrix.features || 'default' }}-${{
            hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-feat-

      - name: Build
        run: |
          FEATURES=$(echo "${{ matrix.features }}" | tr ' ' ',')
          if [ -z "$FEATURES" ]; then
            cargo build
          else
            cargo build --features "$FEATURES"
          fi

      - name: Test
        run: |
          FEATURES=$(echo "${{ matrix.features }}" | tr ' ' ',')
          if [ -z "$FEATURES" ]; then
            cargo test
          else
            cargo test --features "$FEATURES"
          fi

  stealth:
    name: Stealth feature (BoringSSL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install BoringSSL build deps
        run: sudo apt-get update && sudo apt-get install -y cmake nasm

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-stealth-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-stealth-

      - name: Check stealth feature
        run: cargo check --features stealth

      - name: Check stealth + browser
        run: cargo check --features stealth,browser

  lint:
    name: Clippy & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (postgres feature)
        run: cargo clippy --all-targets --features postgres -- -D warnings

      - name: Clippy (sqlite feature)
        run: cargo clippy --all-targets --features sqlite -- -D warnings

      - name: Clippy (mysql feature)
        run: cargo clippy --all-targets --features mysql -- -D warnings

      - name: Format check
        run: cargo fmt --check
